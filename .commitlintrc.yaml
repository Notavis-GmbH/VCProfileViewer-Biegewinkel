extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
      - hotfix
      - hwfix
  subject-case:
    - 0
  header-max-length:
    - 2
    - always
    - 100
  body-max-line-length:
    - 1
    - always
    - 120
