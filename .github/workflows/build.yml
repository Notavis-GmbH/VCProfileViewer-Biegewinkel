name: Build VC3DProfileViewer (Qt MSVC2022)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package (Windows x64)
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      KEYGEN_PRODUCT_TOKEN:          ${{ secrets.KEYGEN_PRODUCT_TOKEN }}
      KEYGEN_ACCOUNT_ID:             ${{ secrets.KEYGEN_ACCOUNT_ID }}
      KEYGEN_COMMERCIAL_POLICY_ID:   ${{ secrets.KEYGEN_COMMERCIAL_POLICY_ID }}
      KEYGEN_TRIAL_POLICY_ID:        ${{ secrets.KEYGEN_TRIAL_POLICY_ID }}
      KEYGEN_PRODUCT_ID:             ${{ secrets.KEYGEN_PRODUCT_ID }}

    steps:
    # ── 1. Code auschecken ────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Qt Cache prüfen ────────────────────────────────────────────────────
    - name: Cache Qt 6.8.1
      id: cache-qt
      uses: actions/cache@v4
      with:
        path: C:\Qt
        key: qt-6.8.1-win64-msvc2022-${{ runner.os }}

    # ── 3. Qt 6.8.1 installieren (nur bei Cache-Miss) ─────────────────────────
    - name: Install Qt 6.8.1 via aqt
      if: steps.cache-qt.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        pip install "aqtinstall==3.3.*" --quiet

        # Qt Basis + Charts-Modul installieren
        # Qt Charts ist in Qt 6 ein separates Modul (nicht im Basis-Paket)
        python -m aqt install-qt windows desktop 6.8.1 win64_msvc2022_64 `
          --outputdir "C:\Qt" `
          --modules qtcharts

    # ── 4. Qt-Umgebung setzen ─────────────────────────────────────────────────
    - name: Configure Qt environment
      shell: pwsh
      run: |
        $qtBase = "C:\Qt\6.8.1\msvc2022_64"
        echo "Qt6_DIR=$qtBase\lib\cmake\Qt6"   >> $env:GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$qtBase"        >> $env:GITHUB_ENV
        echo "$qtBase\bin"                      >> $env:GITHUB_PATH

    # ── 5. MSVC2022 x64 aktivieren ────────────────────────────────────────────
    - name: Set up MSVC developer environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    # ── 6. CMake konfigurieren ────────────────────────────────────────────────
    - name: Configure CMake
      shell: pwsh
      run: |
        $ts = Get-Date -Format "yyyy-MM-dd-HHmm"
        Write-Host "Build timestamp: $ts"
        # Sicherheitsrelevante Variablen aus Env lesen
        $token        = $env:KEYGEN_PRODUCT_TOKEN
        $accountId    = $env:KEYGEN_ACCOUNT_ID
        $commercialId = $env:KEYGEN_COMMERCIAL_POLICY_ID
        $trialId      = $env:KEYGEN_TRIAL_POLICY_ID
        $productId    = $env:KEYGEN_PRODUCT_ID
        # Debug: Längen prüfen (keine Werte ausgeben)
        Write-Host "Token length:        $($token.Length)"
        Write-Host "AccountId length:    $($accountId.Length)"
        Write-Host "CommercialId length: $($commercialId.Length)"
        Write-Host "TrialId length:      $($trialId.Length)"
        Write-Host "ProductId length:    $($productId.Length)"
        # CMake-Build-Verzeichnis bereinigen um Cache-Probleme zu vermeiden
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release `
          "-DCMAKE_PREFIX_PATH=C:\Qt\6.8.1\msvc2022_64" `
          "-DBUILD_TIMESTAMP=$ts" `
          "-DKEYGEN_PRODUCT_TOKEN=$token" `
          "-DKEYGEN_ACCOUNT_ID=$accountId" `
          "-DKEYGEN_COMMERCIAL_POLICY_ID=$commercialId" `
          "-DKEYGEN_TRIAL_POLICY_ID=$trialId" `
          "-DKEYGEN_PRODUCT_ID=$productId"

    # ── 7. Bauen ──────────────────────────────────────────────────────────────
    - name: Build
      shell: pwsh
      run: cmake --build build --config Release --parallel

    # ── 8. windeployqt ────────────────────────────────────────────────────────
    - name: Run windeployqt
      shell: pwsh
      run: |
        $exePath = Get-ChildItem -Recurse -Filter "VC3DProfileViewer.exe" build |
                   Select-Object -First 1 -ExpandProperty FullName
        if (-not $exePath) { throw "VC3DProfileViewer.exe nicht gefunden" }
        Write-Host "EXE: $exePath"
        echo "EXE_DIR=$(Split-Path $exePath)" >> $env:GITHUB_ENV
        windeployqt --release --no-translations "$exePath"

    # ── 9. Portablen Ordner zusammenstellen ───────────────────────────────────
    - name: Assemble portable package
      shell: pwsh
      run: |
        $pkg = "VC3DProfileViewer_portable"
        New-Item -ItemType Directory "$pkg"           -Force | Out-Null
        New-Item -ItemType Directory "$pkg\Data"      -Force | Out-Null
        New-Item -ItemType Directory "$pkg\Devices"   -Force | Out-Null
        New-Item -ItemType Directory "$pkg\TestData"  -Force | Out-Null
        Copy-Item -Path "${{ env.EXE_DIR }}\*" -Destination $pkg -Recurse -Force
        # Bundle the 20 test profiles (already copied by CMake POST_BUILD into EXE_DIR/TestData)
        # Copy them again here in case they ended up inside EXE_DIR subtree
        if (Test-Path "${{ env.EXE_DIR }}\TestData") {
            Copy-Item -Path "${{ env.EXE_DIR }}\TestData\*" `
              -Destination "$pkg\TestData" -Recurse -Force
        } else {
            Copy-Item -Path "tests\data\*" -Destination "$pkg\TestData" -Force
        }
        if (Test-Path README.md)  { Copy-Item README.md  $pkg -Force }
        if (Test-Path README.txt) { Copy-Item README.txt $pkg -Force }
        # Copy SVG resources for watermark
        if (Test-Path "${{ env.EXE_DIR }}\resources") {
            New-Item -ItemType Directory "$pkg\resources" -Force | Out-Null
            Copy-Item -Path "${{ env.EXE_DIR }}\resources\*" -Destination "$pkg\resources" -Force
        } elseif (Test-Path "resources\logo_notavis.svg") {
            New-Item -ItemType Directory "$pkg\resources" -Force | Out-Null
            Copy-Item "resources\logo_notavis.svg" "$pkg\resources\" -Force
        }
        $sha = "${{ github.sha }}".Substring(0,7)
        $ts  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm UTC")
        $ver = "v2.2-$ts"
        "VC3DProfileViewer $ver`nBranch: ${{ github.ref_name }}`nCommit: $sha`nBuilt : $ts UTC" |
          Out-File -Encoding utf8 "$pkg\VERSION.txt"

    # ── 10. Artefakt hochladen (immer, 30 Tage) ───────────────────────────────
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: VC3DProfileViewer_portable_${{ github.sha }}
        path: VC3DProfileViewer_portable\
        retention-days: 30

    # ── 11. Release ZIP + GitHub Release (nur main-Push) ─────────────────────
    - name: Create release ZIP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        $ts  = Get-Date -Format "yyyy-MM-dd-HHmm"
        $sha = "${{ github.sha }}".Substring(0,7)
        Compress-Archive -Path "VC3DProfileViewer_portable\*" `
          -DestinationPath "VCProfileViewer_Biegewinkel_v2.2-${ts}-${sha}.zip" -Force

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name:    build-${{ github.run_number }}
        name:        "VC3DProfileViewer v2.2 – Build #${{ github.run_number }}"
        body: |
          ## Automatischer Build von `main`

          **Commit:** `${{ github.sha }}`  
          **Build:** #${{ github.run_number }}

          ### Installation
          ZIP entpacken → `VC3DProfileViewer.exe` starten. Kein Installer nötig.

          ### Inhalt
          - `VC3DProfileViewer.exe` + Qt 6.8.1 DLLs (windeployqt)
          - `Data/` – JSON-Aufzeichnungen hier ablegen
          - `Devices/` – Einstellungen (wird beim ersten Start erzeugt)
          - `TestData/` – 20 Beispielprofile zum direkten Testen (JSON Wiedergabe)

          ### Änderungen
          Siehe [Commit-History](https://github.com/${{ github.repository }}/commits/main)
        files: VCProfileViewer_Biegewinkel_v2.2-*.zip
        draft:       false
        prerelease:  false
        make_latest: true
        overwrite_files: true

