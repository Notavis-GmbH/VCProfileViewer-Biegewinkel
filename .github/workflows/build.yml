name: Build VC3DProfileViewer (Qt MSVC2022)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Package (Windows x64)
    runs-on: windows-2022

    steps:
    # ── 1. Code auschecken ────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Qt 6.8 via aqt mit explizitem Mirror ───────────────────────────────
    #   Der Standard-Mirror (download.qt.io) ist derzeit für 6.7.x nicht
    #   zuverlässig erreichbar. Wir geben einen alternativen Mirror vor und
    #   nutzen Qt 6.8.1 (neueste stabile LTS).
    - name: Install Qt 6 via aqt (mirror fallback)
      shell: pwsh
      run: |
        pip install "aqtinstall==3.3.*"

        # Primär: offizieller Qt-Mirror
        $mirrors = @(
          "https://download.qt.io/online/qtsdkrepository/",
          "https://mirrors.dotsrc.org/qtproject/online/qtsdkrepository/",
          "https://ftp.fau.de/qtproject/online/qtsdkrepository/"
        )

        $success = $false
        foreach ($mirror in $mirrors) {
          Write-Host "Versuche Mirror: $mirror"
          python -m aqt install-qt windows desktop 6.8.1 win64_msvc2022_64 `
            --outputdir "${{ github.workspace }}\Qt" `
            --base "$mirror" 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Erfolg mit Mirror: $mirror"
            $success = $true
            break
          }
          Write-Host "Mirror fehlgeschlagen, versuche naechsten..."
        }
        if (-not $success) { exit 1 }

    - name: Set Qt environment variables
      shell: pwsh
      run: |
        $qtDir = "${{ github.workspace }}\Qt\6.8.1\msvc2022_64"
        echo "Qt6_DIR=$qtDir\lib\cmake\Qt6" >> $env:GITHUB_ENV
        echo "CMAKE_PREFIX_PATH=$qtDir" >> $env:GITHUB_ENV
        echo "$qtDir\bin" >> $env:GITHUB_PATH

    # ── 3. MSVC2022 x64 aktivieren ────────────────────────────────────────────
    - name: Set up MSVC developer environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    # ── 4. CMake konfigurieren ────────────────────────────────────────────────
    - name: Configure CMake
      shell: pwsh
      run: |
        cmake -B build `
          -G "NMake Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.CMAKE_PREFIX_PATH }}"

    # ── 5. Bauen ──────────────────────────────────────────────────────────────
    - name: Build
      run: cmake --build build --config Release --parallel

    # ── 6. windeployqt ────────────────────────────────────────────────────────
    - name: Run windeployqt
      shell: pwsh
      run: |
        $exePath = Get-ChildItem -Recurse -Filter "VC3DProfileViewer.exe" build |
                   Select-Object -First 1 -ExpandProperty FullName
        if (-not $exePath) { throw "VC3DProfileViewer.exe nicht gefunden" }
        Write-Host "EXE: $exePath"
        echo "EXE_DIR=$(Split-Path $exePath)" >> $env:GITHUB_ENV
        windeployqt --release --no-translations "$exePath"

    # ── 7. Portablen Ordner zusammenstellen ───────────────────────────────────
    - name: Assemble portable package
      shell: pwsh
      run: |
        $pkg = "VC3DProfileViewer_portable"
        New-Item -ItemType Directory "$pkg"         -Force | Out-Null
        New-Item -ItemType Directory "$pkg\Data"    -Force | Out-Null
        New-Item -ItemType Directory "$pkg\Devices" -Force | Out-Null
        Copy-Item -Path "${{ env.EXE_DIR }}\*" -Destination $pkg -Recurse -Force
        Copy-Item README.txt $pkg -Force
        $sha = "${{ github.sha }}".Substring(0,7)
        $ts  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm UTC")
        "VC3DProfileViewer v2.0`nBranch: ${{ github.ref_name }}`nCommit: $sha`nBuilt : $ts" |
          Out-File -Encoding utf8 "$pkg\VERSION.txt"

    # ── 8. Artefakt hochladen (immer, 30 Tage) ────────────────────────────────
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: VC3DProfileViewer_portable_${{ github.sha }}
        path: VC3DProfileViewer_portable\
        retention-days: 30

    # ── 9. Release ZIP + GitHub Release (nur main-Push) ──────────────────────
    - name: Create release ZIP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        $sha = "${{ github.sha }}".Substring(0,7)
        Compress-Archive -Path "VC3DProfileViewer_portable\*" `
          -DestinationPath "VC3DProfileViewer_v2.0_${sha}.zip" -Force

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name:    build-${{ github.run_number }}
        name:        "VC3DProfileViewer v2.0 – Build #${{ github.run_number }}"
        body: |
          ## Automatischer Build von `main`

          **Commit:** `${{ github.sha }}`  
          **Build:** #${{ github.run_number }}

          ### Installation
          ZIP entpacken → `VC3DProfileViewer.exe` starten. Kein Installer nötig.

          ### Inhalt
          - `VC3DProfileViewer.exe` + Qt6-DLLs (windeployqt)
          - `Data/` – JSON-Aufzeichnungen hier ablegen
          - `Devices/` – Einstellungen (wird beim ersten Start erzeugt)

          ### Änderungen
          Siehe [Commit-History](https://github.com/${{ github.repository }}/commits/main)
        files: VC3DProfileViewer_v2.0_*.zip
        draft:       false
        prerelease:  false
        make_latest: true
