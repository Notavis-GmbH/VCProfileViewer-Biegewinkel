name: Build VC3DProfileViewer (Qt MSVC2022)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build & Package (Windows x64)
    runs-on: windows-2022

    steps:
    # ── 1. Code auschecken ────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Qt 6 installieren (aqt mit Mirror-Fallback) ────────────────────────
    #   aqt 3.x sucht qt_base auf verschiedenen Mirrors.
    #   Wir geben explizit einen stabilen Mirror vor und nutzen
    #   zusätzlich einen Retry-Mechanismus über den extra_archives Workaround.
    - name: Install Qt 6
      uses: jurplel/install-qt-action@v4
      with:
        version:      '6.7.2'              # 6.7.2 ist stabiler im aqt-Mirror als 6.7.3
        host:         'windows'
        target:       'desktop'
        arch:         'win64_msvc2022_64'
        cache:        true
        cache-key-prefix: qt672-msvc2022
        aqtversion:   '==3.1.*'            # 3.1.x hat bewährtere Mirror-Logik als 3.3
        py7zrversion: '>=0.20.0'

    # ── 3. MSVC2022 x64 Umgebung aktivieren ──────────────────────────────────
    - name: Set up MSVC developer environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    # ── 4. CMake konfigurieren ────────────────────────────────────────────────
    - name: Configure CMake
      run: |
        cmake -B build `
          -G "NMake Makefiles" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    # ── 5. Bauen ──────────────────────────────────────────────────────────────
    - name: Build
      run: cmake --build build --config Release --parallel

    # ── 6. EXE-Verzeichnis ermitteln und windeployqt ausführen ────────────────
    - name: Run windeployqt
      shell: pwsh
      run: |
        # EXE-Pfad suchen (CMake-Output kann variieren)
        $exePath = Get-ChildItem -Recurse -Filter "VC3DProfileViewer.exe" build | `
                   Select-Object -First 1 -ExpandProperty FullName
        if (-not $exePath) { throw "VC3DProfileViewer.exe not found in build/" }
        Write-Host "Found EXE: $exePath"
        echo "EXE_PATH=$exePath" >> $env:GITHUB_ENV
        echo "EXE_DIR=$(Split-Path $exePath)" >> $env:GITHUB_ENV

        windeployqt --release --no-translations "$exePath"

    # ── 7. Portablen Paketordner zusammenstellen ──────────────────────────────
    - name: Assemble portable package
      shell: pwsh
      run: |
        $pkg = "VC3DProfileViewer_portable"
        New-Item -ItemType Directory -Path "$pkg"          -Force | Out-Null
        New-Item -ItemType Directory -Path "$pkg\Data"     -Force | Out-Null
        New-Item -ItemType Directory -Path "$pkg\Devices"  -Force | Out-Null

        # EXE + alle DLLs/Plugins aus windeployqt
        Copy-Item -Path "${{ env.EXE_DIR }}\*" -Destination $pkg -Recurse -Force

        # README mitliefern
        Copy-Item README.txt $pkg -Force

        # Versionsdatei
        $sha  = "${{ github.sha }}".Substring(0,7)
        $ref  = "${{ github.ref_name }}"
        $ts   = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm UTC")
        "VC3DProfileViewer v2.0`nBranch : $ref`nCommit : $sha`nBuilt  : $ts" `
          | Out-File -Encoding utf8 "$pkg\VERSION.txt"

        Write-Host "`nPackage contents:"
        Get-ChildItem $pkg -Recurse | Select-Object -ExpandProperty FullName

    # ── 8. Artefakt hochladen (bei Push UND PRs – 30 Tage) ───────────────────
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: VC3DProfileViewer_portable_${{ github.sha }}
        path: VC3DProfileViewer_portable\
        retention-days: 30

    # ── 9. ZIP + GitHub Release erstellen (nur bei Push auf main) ────────────
    - name: Create release ZIP
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      shell: pwsh
      run: |
        $sha = "${{ github.sha }}".Substring(0,7)
        Compress-Archive `
          -Path "VC3DProfileViewer_portable\*" `
          -DestinationPath "VC3DProfileViewer_v2.0_${sha}.zip" `
          -Force

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name:    build-${{ github.run_number }}
        name:        "VC3DProfileViewer v2.0 – Build #${{ github.run_number }}"
        body: |
          ## Automatischer Build von `main`

          **Commit:** `${{ github.sha }}`  
          **Build:**  #${{ github.run_number }}

          ### Installation
          ZIP entpacken → `VC3DProfileViewer.exe` doppelklicken.  
          Kein Installer erforderlich (portable).

          ### Inhalt
          - `VC3DProfileViewer.exe` + alle Qt6-DLLs
          - `Data/` – JSON-Aufzeichnungen hier ablegen
          - `Devices/` – Einstellungen (default.ini, wird beim ersten Start erzeugt)

          ### Änderungen
          Siehe [Commit-History](https://github.com/${{ github.repository }}/commits/main)
        files: VC3DProfileViewer_v2.0_*.zip
        draft:       false
        prerelease:  false
        make_latest: true
